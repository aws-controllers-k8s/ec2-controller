apiVersion: ec2.services.k8s.aws/v1alpha1
kind: VPCEndpoint
metadata:
  name: $VPC_ENDPOINT_NAME
spec:
  serviceName: $SERVICE_NAME
  vpcID: $VPC_ID
  policyDocument: |
    {"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"*","Resource":"*"}]}
  tags:
    - key: $TAG_KEY
      value: $TAG_VALUE
